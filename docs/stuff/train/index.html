<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Train & Wagon Math Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        #board { display: flex; flex-wrap: wrap; width: 520px; margin: 10px auto; }
        .cell {
            width: 50px; height: 40px; line-height: 40px;
            margin: 1px; background: #fff;
            border: 1px solid #ccc; position: relative;
        }
        .town { background: #ffe0b3; font-weight: bold; }
        button { margin: 5px; padding: 10px; font-size: 16px; }
        #expression, #result, #player-info { margin: 10px; font-size: 18px; }
        #controls { margin-top: 15px; }
    </style>
</head>
<body>
    <h1>🚂 Train & Wagon Math Game 🚗</h1>
    <div id="player-info"></div>
    <div id="board"></div>
    <div>
        <h2>Choose Numbers</h2>
        <div id="numbers"></div>
    </div>
    <div>
        <h2>Choose Operators (once each)</h2>
        <div id="operators"></div>
    </div>
    <div id="expression"></div>
    <div id="result"></div>
    <div id="controls">
        <button id="ok-btn">OK ✓</button>
    </div>
    <script src="train.js"></script>
</body>
</html>
