<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Arithmetic Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Train Arithmetic Game</h1>
            <div class="player-info">
                <div id="player1" class="player active">
                    <span class="player-name">Player 1 (Train)</span>
                    <span class="player-position">Position: 0</span>
                </div>
                <div id="player2" class="player">
                    <span class="player-name">Player 2 (Wagon)</span>
                    <span class="player-position">Position: 0</span>
                </div>
            </div>
        </div>

        <div class="game-board">
            <div id="board-track"></div>
        </div>

        <div class="game-controls">
            <div class="numbers-container">
                <div class="numbers-title">Your Numbers:</div>
                <div id="numbers" class="numbers"></div>
            </div>
            
            <div class="expression-container">
                <div class="expression-title">Your Expression:</div>
                <div id="expression" class="expression"></div>
                <div id="result" class="result">Result: 0</div>
            </div>

            <div class="operations">
                <button class="op-btn" data-op="+">+</button>
                <button class="op-btn" data-op="-">-</button>
                <button class="op-btn" data-op="×">×</button>
                <button class="op-btn" data-op="÷">÷</button>
            </div>

            <div class="action-buttons">
                <button id="clear-btn">Clear</button>
                <button id="submit-btn">Move</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
